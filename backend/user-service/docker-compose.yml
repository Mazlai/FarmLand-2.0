services:

  user_service:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: user_service
    restart: unless-stopped
    networks:
      - farmland_network
    ports:
      - "3001:3001"
    depends_on:
      user_db:
        condition: service_healthy
    volumes:
      - ./:/home
    working_dir: /home
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  user_db:
    image: postgres:16-alpine
    container_name: user_pgdb
    restart: unless-stopped
    environment:
      POSTGRES_USER: farmland
      POSTGRES_PASSWORD: strongherve
      POSTGRES_DB: userdb
      PGPORT: 5432
    ports:
      - "5432:5432"
    networks:
      - farmland_network
    volumes:
      - local_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmland -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  user_pgadmin:
    image: dpage/pgadmin4
    container_name: user_pgadmin4
    restart: unless-stopped
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: farmland@ariege.com
      PGADMIN_DEFAULT_PASSWORD: hervedu09
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - farmland_network
    depends_on:
      user_db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

volumes:
  local_pgdata:
  pgadmin-data:

networks:
  farmland_network:
    external: true
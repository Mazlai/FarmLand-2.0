services:

  angular_app:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: angular_app
    restart: unless-stopped
    ports:
      - "4200:4200"
    networks:
      - farmland_network
    volumes:
      - ./:/app
    working_dir: /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 2G

networks:
  farmland_network:
    external: true
